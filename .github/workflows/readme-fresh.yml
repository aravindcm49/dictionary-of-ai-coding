name: README freshness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck generator
        run: npx tsc -p internal/tsconfig.json
      - name: Regenerate README
        run: npm run generate
      - name: Fail if README.md is out of sync
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "README.md is out of sync with dictionary/, internal/Curriculum.md, or internal/README.template.md."
            echo "Run: npm run generate && commit the result."
            exit 1
          fi
