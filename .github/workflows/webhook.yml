name: Notify webhook on push

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.AIHERO_WEBHOOK_SECRET }}
          PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | awk '{print $2}')
          curl -sS -X POST https://www.aihero.dev/api/webhooks/ai-coding-dictionary \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -H "X-GitHub-Event: push" \
            --data-raw "$PAYLOAD" \
            --fail-with-body
