name: Notify webhook on push

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send webhook
        run: |
          curl -sS -X POST https://www.aihero.dev/api/webhooks/ai-coding-dictionary \
            -H "Secret: ${{ secrets.AIHERO_WEBHOOK_SECRET }}" \
            --fail-with-body
